name: Generate Pac-Man Animation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Pac-Man
        uses: Platane/snk@v3
        with:
          github_user_name: sourabhbagda24
          outputs: |
            dist/pacman.svg?color_snake=yellow&color_dots=#00cfff,#003366,#0080ff,#00ffff,#ffffff
            dist/pacman-dark.svg?palette=github-dark&color_snake=yellow&color_dots=#00cfff,#003366,#0080ff,#00ffff,#ffffff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
